<div class="user-register-container">
    <h2>User Login</h2>
    <form [formGroup]="userRegisterForm" (ngSubmit)="onRegistrationSubmit()">
        <div class="form-group">
    <label for="userName"></label>
    <input name="userName" id="userName" formControlName="userName" type="text" class="formControl" placeholder="Enter UserName">
    <div *ngIf="userRegisterForm.get('userName')?.invalid && userRegisterForm.get('userName')?.touched" class="error">
        Required UserName!
    </div>
    </div>
        <div class="form-group">
    <label for="email"></label>
    <input name="email" id="email" formControlName="email" type="email" class="formControl" placeholder="Enter email">
    <div *ngIf="userRegisterForm.get('email')?.invalid && userRegisterForm.get('email')?.touched" class="error">
        Required email!
    </div>
    </div>
        <div class="form-group">
    <label for="password"></label>
    <input name="password" id="password" formControlName="password" type="password" class="formControl" placeholder="Enter password">
    <div *ngIf="userRegisterForm.get('password')?.invalid && userRegisterForm.get('password')?.touched" class="error">
        Required password!
    </div>
    </div>
        <div class="form-group">
    <label for="mobileNo"></label>
    <input name="mobileNo" id="mobileNo" formControlName="mobileNo" type="text" class="formControl" placeholder="Enter mobileNo">
    <div *ngIf="userRegisterForm.get('mobileNo')?.invalid && userRegisterForm.get('mobileNo')?.touched" class="error">
        Required mobileNo!
    </div>
    </div>
        <div class="form-group">
    <label for="address"></label>
    <input name="address" id="address" formControlName="address" type="text" class="formControl" placeholder="Enter address">
    <div *ngIf="userRegisterForm.get('address')?.invalid && userRegisterForm.get('address')?.touched" class="error">
        Required address!
    </div>
    </div>
    <button type="submit" class="user-register-button" [disabled]="userRegisterForm.invalid">Register</button>
    </form>
</div>
