<<div class="user-login-container">
    <h2>User Login</h2>
    <form [formGroup]="userLoginForm" (ngSubmit)="userLoginSubmit()">
        <div class="form-group">
            <label for="username">UserName</label>
            <input id="username" formControlName="username" type="text" class="form-control" placeholder="Enter Username">
            <div *ngIf="userLoginForm.get('username')?.invalid && userLoginForm.get('username')?.touched" class="error">
                Username is required.
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" formControlName="password" type="password" class="form-control" placeholder="Enter Password">
            <div *ngIf="userLoginForm.get('password')?.invalid && userLoginForm.get('password')?.touched" class="error">
                Password is required.
            </div>
        </div>
        <button type="submit" class="userlogin-button"  [disabled]="userLoginForm.invalid">Login</button>
    </form>
</div>
